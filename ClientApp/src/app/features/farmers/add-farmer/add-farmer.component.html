<app-nav-menu></app-nav-menu>

<div class="container mt-4">

  <div class="card p-4">

    <h3 class="mb-4">
      Add Farmer
    </h3>

    <div class="row">

      <div class="col-md-6 mb-3">

        <label>Name</label>

        <input type="text"
               class="form-control"
               [(ngModel)]="farmer.name">

      </div>

      <div class="col-md-6 mb-3">

        <label>Mobile</label>

        <input type="text"
               class="form-control"
               [(ngModel)]="farmer.mobile">

      </div>

      <div class="col-md-6 mb-3">

        <label>Village</label>

        <input type="text"
               class="form-control"
               [(ngModel)]="farmer.village">

      </div>

      <div class="col-md-6 mb-3">

        <label>State</label>

        <input type="text"
               class="form-control"
               [(ngModel)]="farmer.state">

      </div>

      <div class="col-md-6 mb-3">

        <label>Land Area</label>

        <input type="number"
               class="form-control"
               [(ngModel)]="farmer.landArea">

      </div>

    </div>

    <button class="btn btn-success"
            (click)="saveFarmer()">

      Save Farmer
    </button>

  </div>

</div>
