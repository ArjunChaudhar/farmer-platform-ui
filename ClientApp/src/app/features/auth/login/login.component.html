<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card p-4">

        <h3 class="text-center mb-4">
          Login
        </h3>

        <div class="mb-3">
          <label>Mobile</label>

          <input type="text"
                 class="form-control"
                 [(ngModel)]="loginData.mobile">
        </div>

        <div class="mb-3">
          <label>Password</label>

          <input type="password"
                 class="form-control"
                 [(ngModel)]="loginData.password">
        </div>

        <button class="btn btn-primary w-100"
                (click)="login()">

          Login
        </button>

      </div>

    </div>
  </div>
</div>
